global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'clickhouse'
    static_configs:
      - targets: ['clickhouse:9363']
    metrics_path: /metrics

  # NOTE: Kafka and Debezium are intentionally not scraped. Adding them would
  # require a jmx_prometheus_javaagent (Kafka) or a JMX-to-Prometheus exporter
  # sidecar (Debezium Connect); the raw JMX/Connect REST endpoints do not
  # serve Prometheus text exposition format. Only ClickHouse is scraped today.
